name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject token into config.json
        run: |
          printf '{"ghToken":"%s","ghRepo":"GavinYPS/parkrun-league","ghPath":"data.json"}' "${{ secrets.TOKEN }}" > config.json
      - name: Commit config.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json
          git diff --staged --quiet || git commit -m "chore: inject config [skip ci]"
          git push
